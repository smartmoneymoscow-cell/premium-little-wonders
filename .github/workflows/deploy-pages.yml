name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build client bundle
        env:
          VITE_BASE: /premium-little-wonders/
        run: bunx vite build --mode production

      - name: Prepare output
        run: |
          mkdir -p dist
          cp -r .output/public/* dist/ 2>/dev/null || true
          if [ ! -f dist/index.html ]; then
            cp -r client/* dist/ 2>/dev/null || true
          fi
          if [ ! -f dist/index.html ]; then
            echo "ERROR: No index.html found"
            find . -name "index.html" -not -path "*/node_modules/*" | head -5
            exit 1
          fi

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
