name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build site
        run: bun run build || true

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp -r .output/public/* dist/ 2>/dev/null || true

          # Extract asset filenames
          JS_FILE=$(ls dist/assets/index-*.js 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          CSS_FILE=$(ls dist/assets/styles-*.css 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")

          if [ -z "$JS_FILE" ]; then
            echo "ERROR: No JS bundle found"
            ls -R dist/
            exit 1
          fi

          echo "JS: $JS_FILE, CSS: $CSS_FILE"

          cat > dist/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Премиальный магазин детских товаров</title>
            <meta name="description" content="B2B/B2C интернет-магазин детских товаров: каталог 5000+ SKU, оптовые цены, ИИ-консультант, быстрая доставка.">
            <meta property="og:title" content="Премиальный магазин детских товаров">
            <meta property="og:description" content="B2B/B2C интернет-магазин детских товаров: каталог 5000+ SKU, оптовые цены, ИИ-консультант, быстрая доставка.">
            <meta property="og:type" content="website">
            <meta name="twitter:card" content="summary_large_image">
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
            STYLES_PLACEHOLDER
          </head>
          <body>
            <div id="root"></div>
            SCRIPT_PLACEHOLDER
          </body>
          </html>
          HTMLEOF

          # Inject actual asset references
          if [ -n "$CSS_FILE" ]; then
            sed -i "s|STYLES_PLACEHOLDER|<link rel=\"stylesheet\" href=\"/premium-little-wonders/assets/$CSS_FILE\">|" dist/index.html
          else
            sed -i "s|STYLES_PLACEHOLDER||" dist/index.html
          fi
          sed -i "s|SCRIPT_PLACEHOLDER|<script type=\"module\" src=\"/premium-little-wonders/assets/$JS_FILE\"></script>|" dist/index.html

          touch dist/.nojekyll
          echo "Final dist:"
          ls -la dist/
          echo "---"
          head -30 dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
